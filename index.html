<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 스티커 메모</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }
        .sticky-note { border-bottom-right-radius: 20px 20px; transition: all 0.3s ease; }
        .sticky-note:hover { transform: translateY(-4px); }
    </style>
</head>
<body class="min-h-screen bg-neutral-100 p-6 text-gray-800">
    <div class="max-w-6xl mx-auto space-y-8">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <h1 class="text-3xl font-bold mb-6 text-gray-900 flex items-center gap-2">
                <span>📝</span> 스티커 메모
            </h1>
            <div class="flex flex-col sm:flex-row gap-4">
                <textarea id="memoInput" placeholder="새로운 메모를 입력하세요... (Ctrl + Enter)" 
                    class="flex-1 min-h-[100px] p-4 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-yellow-400 focus:border-transparent resize-none outline-none"></textarea>
                <button onclick="addMemo()" class="sm:w-32 py-4 bg-gray-900 hover:bg-gray-800 text-white rounded-xl font-medium flex items-center justify-center gap-2 transition-colors">
                    <i data-lucide="plus"></i>추가
                </button>
            </div>
            <div id="colorPicker" class="flex gap-2 mt-4 ml-1"></div>
        </div>

        <div class="flex justify-between items-center bg-white px-4 py-3 rounded-xl shadow-sm border border-gray-100">
            <div class="text-sm font-medium text-gray-600">총 <span id="memoCount" class="text-gray-900 font-bold">0</span>개의 메모</div>
            <select id="sortSelect" onchange="renderMemos()" class="bg-transparent text-sm font-medium text-gray-700 outline-none cursor-pointer">
                <option value="newest">최신순</option>
                <option value="oldest">오래된순</option>
            </select>
        </div>

        <div id="memoGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
    </div>

    <script>
        const STICKY_COLORS = ['bg-yellow-200', 'bg-pink-200', 'bg-blue-200', 'bg-green-200', 'bg-purple-200', 'bg-orange-200', 'bg-teal-200', 'bg-rose-200'];
        let memos = JSON.parse(localStorage.getItem('myMemos')) || [
            { id: 1, text: '환영합니다! 🎉\n이 메모는 브라우저에 저장됩니다.', color: 'bg-yellow-200', createdAt: Date.now() }
        ];
        let selectedColor = STICKY_COLORS[0];

        // 색상 선택기 생성
        const colorPicker = document.getElementById('colorPicker');
        STICKY_COLORS.forEach(color => {
            const btn = document.createElement('button');
            btn.className = `w-6 h-6 rounded-full ${color} shadow-sm transition-transform hover:scale-110 ring-offset-2`;
            btn.onclick = () => {
                selectedColor = color;
                document.querySelectorAll('#colorPicker button').forEach(b => b.classList.remove('ring-2', 'ring-gray-800'));
                btn.classList.add('ring-2', 'ring-gray-800');
            };
            if(color === selectedColor) btn.classList.add('ring-2', 'ring-gray-800');
            colorPicker.appendChild(btn);
        });

        // 메모 추가 함수
        function addMemo() {
            const input = document.getElementById('memoInput');
            if (!input.value.trim()) return;
            const newMemo = {
                id: Date.now(),
                text: input.value,
                color: selectedColor,
                createdAt: Date.now()
            };
            memos.push(newMemo);
            input.value = '';
            saveAndRender();
        }

        // 메모 삭제 함수
        function deleteMemo(id) {
            if(confirm('삭제하시겠습니까?')) {
                memos = memos.filter(m => m.id !== id);
                saveAndRender();
            }
        }

        // 저장 및 리렌더링
        function saveAndRender() {
            localStorage.setItem('myMemos', JSON.stringify(memos));
            renderMemos();
        }

        function renderMemos() {
            const grid = document.getElementById('memoGrid');
            const sort = document.getElementById('sortSelect').value;
            const count = document.getElementById('memoCount');
            
            let sorted = [...memos];
            if(sort === 'newest') sorted.sort((a,b) => b.createdAt - a.createdAt);
            else sorted.sort((a,b) => a.createdAt - b.createdAt);

            count.innerText = memos.length;
            grid.innerHTML = sorted.map(memo => `
                <div class="${memo.color} sticky-note shadow-md p-5 flex flex-col min-h-[240px] relative group">
                    <div class="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 w-10 h-3 bg-white/30 rounded-sm"></div>
                    <p class="flex-1 whitespace-pre-wrap break-words leading-relaxed pt-2">${memo.text}</p>
                    <div class="mt-4 flex items-end justify-between border-t border-black/5 pt-3">
                        <span class="text-[11px] text-gray-600">${new Date(memo.createdAt).toLocaleDateString()}</span>
                        <button onclick="deleteMemo(${memo.id})" class="opacity-0 group-hover:opacity-100 p-1.5 hover:bg-red-500/20 text-gray-700 hover:text-red-600 rounded-md transition-all">
                            <i data-lucide="trash-2" style="width:16px; height:16px;"></i>
                        </button>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // 단축키 (Ctrl + Enter)
        document.getElementById('memoInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) addMemo();
        });

        // 초기 실행
        renderMemos();
    </script>
</body>
</html>
